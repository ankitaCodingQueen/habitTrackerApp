<div class="app-container">
  <!-- Header -->
  <header class="app-header">
    <div class="header-content">
      <h1>📅 {{ title }}</h1>
      <p class="tagline">Build better habits, one day at a time</p>
    </div>
  </header>

  <!-- Navigation Tabs -->
  <nav class="app-nav">
    <div class="nav-container">
      <button
        class="nav-tab"
        [ngClass]="{ active: activeTab === 'habits' }"
        (click)="setActiveTab('habits')"
      >
        📝 Manage Habits
      </button>
      <button
        class="nav-tab"
        [ngClass]="{ active: activeTab === 'quick-log' }"
        (click)="setActiveTab('quick-log')"
      >
        📋 Quick Log
      </button>
      <button
        class="nav-tab"
        [ngClass]="{ active: activeTab === 'tracker' }"
        (click)="setActiveTab('tracker')"
      >
        ✓ Daily Tracker
      </button>
      <button
        class="nav-tab"
        [ngClass]="{ active: activeTab === 'report' }"
        (click)="setActiveTab('report')"
      >
        📊 Monthly Report
      </button>
    </div>
  </nav>

  <!-- Main Content -->
  <main class="app-main">
    <app-habit-management *ngIf="activeTab === 'habits'"></app-habit-management>
    <app-quick-log *ngIf="activeTab === 'quick-log'"></app-quick-log>
    <app-daily-tracker *ngIf="activeTab === 'tracker'"></app-daily-tracker>
    <app-monthly-report *ngIf="activeTab === 'report'"></app-monthly-report>
  </main>

  <!-- Footer -->
  <footer class="app-footer">
    <p>🚀 Habit Tracker v1.0 | All data saved locally in your browser</p>
  </footer>
</div>

<router-outlet></router-outlet>
