<div class="habit-management">
  <div class="header">
    <h2>My Habits</h2>
    <button class="btn btn-primary" (click)="toggleForm()">
      {{ showForm ? '✕ Cancel' : '+ Add Habit' }}
    </button>
  </div>

  <!-- Add/Edit Form -->
  <div class="form-container" *ngIf="showForm">
    <div class="form-content">
      <h3>{{ isEditing ? 'Edit Habit' : 'Create New Habit' }}</h3>
      
      <div class="form-group">
        <label for="habitName">Habit Name *</label>
        <input
          type="text"
          id="habitName"
          [(ngModel)]="habitName"
          placeholder="e.g., Morning Exercise"
          class="form-input"
        />
      </div>

      <div class="form-group">
        <label for="habitDescription">Description</label>
        <textarea
          id="habitDescription"
          [(ngModel)]="habitDescription"
          placeholder="e.g., 30 minutes of cardio or strength training"
          class="form-input"
          rows="3"
        ></textarea>
      </div>

      <div class="form-actions">
        <button
          class="btn btn-success"
          (click)="isEditing ? saveEditedHabit() : addHabit()"
        >
          {{ isEditing ? 'Save Changes' : 'Create Habit' }}
        </button>
        <button class="btn btn-secondary" (click)="cancelEdit()">
          Cancel
        </button>
      </div>
    </div>
  </div>

  <!-- Habits List -->
  <div class="habits-list">
    <div
      class="habit-card"
      *ngFor="let habit of habits"
      [style.border-left]="'5px solid ' + habit.color"
    >
      <div class="habit-header">
        <div class="habit-info">
          <h4>{{ habit.name }}</h4>
          <p *ngIf="habit.description" class="habit-description">
            {{ habit.description }}
          </p>
        </div>
        <div class="habit-actions">
          <button class="btn-icon edit" (click)="editHabit(habit)" title="Edit">
            ✏️
          </button>
          <button class="btn-icon delete" (click)="deleteHabit(habit.id)" title="Delete">
            🗑️
          </button>
        </div>
      </div>
    </div>

    <div class="empty-state" *ngIf="habits.length === 0">
      <p>No habits yet. Create your first habit to get started!</p>
    </div>
  </div>
</div>
